# Deploys ONE Worker that serves the app (public/) and the /proxy video endpoint.
# Keeping the name "xdownload" updates your existing Worker in place, so the URL
# stays https://xdownload.<your-subdomain>.workers.dev
name = "xdownload"
main = "worker.js"
compatibility_date = "2024-11-01"

# Serve the static app from /public. `binding = "ASSETS"` lets the Worker fall
# back to static files for any non-/proxy request.
[assets]
directory = "../public"
binding = "ASSETS"

# Deploy from this folder:  wrangler deploy
# (Requires a recent wrangler — `npm install -g wrangler` — for Static Assets.)
